# GitLab CI/CD Pipeline for pyhardisp
# Runs tests on all commits to feature/* and test/* branches (and main/master)

# Prevent duplicate pipelines: prefer MR pipelines over branch pipelines
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

stages:
  - build
  - test



# -------------------------------------------------------
# Build base image — only on master when deps change
# -------------------------------------------------------
build-gsolve-base:
  tags:
    - linux
  stage: build
  variables:
    IMAGE: "artifactory.gns.cri.nz/gns/gsolve-base"
    TAG: "latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        paths:
          - pyproject.toml
          - Dockerfile
  script:
    - docker build -t "${IMAGE}:${TAG}" .
    - docker push "${IMAGE}:${TAG}"


# -------------------------------------------------------
# Test master — depends on build completing (if it ran)
# -------------------------------------------------------
test-master-branch:
  variables:
    IMAGE: "artifactory.gns.cri.nz/gns/gsolve-base"
    TAG: "latest"
  image: "${IMAGE}:${TAG}"
  tags:
    - docker
  stage: test
  needs:
    - job: build-gsolve-base
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always
  before_script:
    - pip install --upgrade pip
    - pip install .[dev]
  script:
    - >
      python -m pytest tests/
      --cov=pyhardisp
      --cov-report=term
      --cov-report=html:coverage_html
      --cov-report=xml:coverage.xml
      -v
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'

# -------------------------------------------------------
# Test feature/MR branches — run on every push
# -------------------------------------------------------
test-feature-branch:
  variables:
    IMAGE: "artifactory.gns.cri.nz/gns/gsolve-base"
    TAG: "latest"
  image: "${IMAGE}:${TAG}"
  tags:
    - docker
  stage: test
  rules:
    - if: '$CI_MERGE_REQUEST_ID'
      when: always
    - if: '$CI_COMMIT_BRANCH != "master"'
      when: always
  before_script:
    - pip install --upgrade pip
    - pip install .[dev]
  script:
    - >
      python -m pytest tests/
      --cov=pyhardisp
      --cov-report=term
      --cov-report=html:coverage_html
      --cov-report=xml:coverage.xml
      -v
  allow_failure: false
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
