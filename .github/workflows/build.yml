name: Build wheels

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:
  build_wheels:
    name: build wheels and sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Get version
        id: version
        run: |
          python -c "import tomllib; v = tomllib.loads(open('pyproject.toml').read())['project']['version']; print(f'VERSION={v}')" >> $GITHUB_OUTPUT
      - name: Build wheel and sdist
        run: python -m build -o wheel
      - uses: actions/upload-artifact@v4
        with:
          name: pyhardisp-${{ steps.version.outputs.VERSION }}
          path: ./wheel/
