name: Build wheels (multi-OS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    name: Build wheels — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install build dependencies
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@3.3.1
        with:
          output-dir: dist
      - name: Upload wheels (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-linux
          path: dist/*.whl

  build-windows:
    name: Build wheels — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install build dependencies
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@3.3.1
        with:
          output-dir: dist
      - name: Upload wheels (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-windows
          path: dist/*.whl

  build-macos:
    name: Build wheels — macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install build dependencies
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@3.3.1
        with:
          output-dir: dist
      - name: Upload wheels (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-macos
          path: dist/*.whl
