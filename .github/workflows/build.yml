name: Build Wheel
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tool
        run: pip install build
      - name: Build wheel
        run: python -m build
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyhardisp-wheel
          path: dist/*.whl
